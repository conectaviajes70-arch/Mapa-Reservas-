<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conecta (viajaYa)</title>

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" rel="stylesheet">

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>

<style>
body { margin:0; font-family: Arial; background:#0b0f1a; color:white; }
.screen { display:none; padding:20px;}
.active { display:block; }

button {
  width:100%; padding:15px; margin:10px 0;
  border:none; border-radius:12px;
  background:#00e5ff; color:#000; font-weight:bold;
}

input, select {
  width:100%; padding:12px; margin:8px 0;
  border-radius:10px; border:none;
  background:#1a1f2e; color:#fff;
}

#map { height:220px; border-radius:12px; margin-top:10px; }

.logo { width:120px; display:block; margin:0 auto; }

.result {
  background:#121726; padding:12px;
  border-radius:10px; margin-top:10px;
}

.price { color:#00e5ff; font-size:20px; }
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
<img src="logo.png" class="logo">
<h2>Bienvenido a Conecta</h2>
<button onclick="show('login')">Ya tengo cuenta</button>
<button onclick="show('register')">Crear cuenta</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
<h3>Ingresar</h3>
<input id="clave" placeholder="Ingresa tu clave">
<button onclick="login()">Entrar</button>
<button onclick="show('home')">Regresar</button>
</div>

<!-- REGISTRO -->
<div id="register" class="screen">
<h3>Registro</h3>
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="+52 55...">
<button onclick="enviarOTP()">Enviar OTP</button>
<input id="otp" placeholder="Código OTP">
<button onclick="validarOTP()">Validar</button>
</div>

<!-- RESERVA -->
<div id="reserva" class="screen">
<h3>Reservar viaje</h3>

<div id="origenBox"></div>
<button onclick="usarUbicacion()">📍 Usar mi ubicación</button>

<div id="destinoBox"></div>
<div id="paradaBox"></div>

<select id="fechaTipo">
  <option value="ahora">Lo más pronto (1-2 hrs)</option>
  <option value="hoy">Hoy</option>
  <option value="mañana">Mañana</option>
  <option value="otro">Otra fecha</option>
</select>

<input type="datetime-local" id="fechaHora">

<div id="map"></div>

<button onclick="cotizar()">Cotizar viaje</button>

<div class="result">
<div> Distancia: <span id="km">0</span> km</div>
<div>⏱ Tiempo: <span id="time">0</span> min</div>
<div class="price"> $<span id="price">0</span></div>
</div>

<button onclick="aceptar()">Aceptar</button>
<button onclick="rechazar()">Rechazar</button>
</div>

<!-- CONFIRMACION -->
<div id="confirm" class="screen">
<h2>🚗 Has reservado con Conecta</h2>
<p>En breve nos comunicaremos contigo</p>
<button onclick="reset()">Nuevo viaje</button>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiMzkxODM2IiwiYSI6ImNtbXl4dWZoNzAyamwycm9pZHBoYjNpNzEifQ.ryQd-8yPv1gX6BkNsToW_A';

let map = new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/mapbox/navigation-night-v1',
  center:[-99.1332,19.4326],
  zoom:12
});

let origenCoord, destinoCoord, paradaCoord;
let markers = [];

/* NAVEGACION */
function show(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

/* LOGIN */
function login(){
 let clave = document.getElementById('clave').value;
 if(clave === "1234"){
   show('reserva');
 } else {
   alert("Clave incorrecta");
   show('register');
 }
}

/* OTP */
let intentosOTP=0, otpGenerado=null, otpTime=null;

function enviarOTP(){
 let tel = document.getElementById('telefono').value;
 if(!tel.startsWith("+52")) return alert("Número inválido");

 if(intentosOTP>=3) return alert("Límite alcanzado");

 otpGenerado = Math.floor(1000+Math.random()*9000);
 otpTime = Date.now();

 alert("OTP: "+otpGenerado);
}

function validarOTP(){
 let otp = document.getElementById('otp').value;

 if(Date.now()-otpTime>300000) return alert("OTP expirado");

 if(otp==otpGenerado){
   guardarUsuario();
   show('reserva');
 } else {
   intentosOTP++;
   alert("OTP incorrecto");
 }
}

/* AUTOCOMPLETE */
function createGeocoder(id, placeholder, callback){
  const geocoder = new MapboxGeocoder({
    accessToken: mapboxgl.accessToken,
    placeholder: placeholder,
    mapboxgl: mapboxgl,
    marker:false,
    countries:'mx'
  });

  document.getElementById(id).appendChild(geocoder.onAdd(map));

  geocoder.on('result', e=>{
    callback(e.result);
  });
}

createGeocoder("origenBox","Origen", res=>{
  origenCoord=res.center;
  setMarker(origenCoord,0);
});

createGeocoder("destinoBox","Destino", res=>{
  destinoCoord=res.center;
  setMarker(destinoCoord,1);
});

createGeocoder("paradaBox","Parada (opcional)", res=>{
  paradaCoord=res.center;
  setMarker(paradaCoord,2);
});

/* MARCADORES */
function setMarker(coord,index){
  if(markers[index]){
    markers[index].setLngLat(coord);
  } else {
    markers[index]=new mapboxgl.Marker().setLngLat(coord).addTo(map);
  }
  map.flyTo({center:coord});
}

/* GPS */
async function usarUbicacion(){
 navigator.geolocation.getCurrentPosition(async pos=>{
   origenCoord=[pos.coords.longitude,pos.coords.latitude];
   setMarker(origenCoord,0);

   let res=await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${origenCoord[0]},${origenCoord[1]}.json?access_token=${mapboxgl.accessToken}`);
   let data=await res.json();

   document.querySelector('#origenBox input').value=data.features[0].place_name;

 },()=>alert("Activa GPS"),{enableHighAccuracy:true});
}

/* DISTANCIA */
function getDistance(c1,c2){
 let R=6371;
 let dLat=(c2[1]-c1[1])*Math.PI/180;
 let dLon=(c2[0]-c1[0])*Math.PI/180;
 let a=Math.sin(dLat/2)**2+
 Math.cos(c1[1]*Math.PI/180)*Math.cos(c2[1]*Math.PI/180)*
 Math.sin(dLon/2)**2;
 return R*(2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)));
}

/* COTIZAR */
async function cotizar(){
 if(!origenCoord||!destinoCoord) return alert("Completa datos");

 let coords=`${origenCoord.join(',')};${destinoCoord.join(',')}`;
 if(paradaCoord){
   coords=`${origenCoord.join(',')};${paradaCoord.join(',')};${destinoCoord.join(',')}`;
 }

 let res=await fetch(`https://api.mapbox.com/directions/v5/mapbox/driving/${coords}?access_token=${mapboxgl.accessToken}`);
 let data=await res.json();

 let route=data.routes[0];

 let km=route.distance/1000;
 let min=route.duration/60;

 // ===== TARIFA INTELIGENTE =====
let velocidad = km / (min / 60);

function factorHora(){
 let h = new Date().getHours();
 if(h>=7 && h<=10) return 1.3;
 if(h>=18 && h<=22) return 1.4;
 if(h>=23 || h<=5) return 1.2;
 return 1;
}

function factorTrafico(v){
 if(v < 20) return 1.4;
 if(v < 35) return 1.2;
 return 1;
}

function factorReserva(){
 let tipo = document.getElementById("fechaTipo").value;
 if(tipo==="mañana") return 1.1;
 if(tipo==="otro") return 1.15;
 return 1;
}

let precioBase = 20 + (km * 7) + (min * 1.5);

let precioFinal = precioBase 
  * factorHora() 
  * factorTrafico(velocidad) 
  * factorReserva();

// 🔥 CONTROL DE TARIFA
precioFinal = Math.min(precioFinal, 800); // máximo
precioFinal = Math.max(precioFinal, 60);  // mínimo

 document.getElementById('km').innerText=km.toFixed(2);
 document.getElementById('time').innerText=min.toFixed(0);
document.getElementById('price').innerText=Math.round(precioFinal); 

 enviarReserva(km,min,precio);
}

/* BOTONES */
function aceptar(){ show('confirm'); }

function rechazar(){
 document.querySelectorAll('input').forEach(i=>i.value="");
 document.getElementById('km').innerText=0;
 document.getElementById('price').innerText=0;
}

/* RESET */
function reset(){ location.reload(); }

/* BACKEND */
function guardarUsuario(){
 fetch("TU_URL_APPS_SCRIPT",{method:"POST",body:JSON.stringify({
   tipo:"registro",
   nombre:document.getElementById('nombre').value,
   telefono:document.getElementById('telefono').value
 })});
}

function enviarReserva(km,min,precio){
 fetch("TU_URL_APPS_SCRIPT",{method:"POST",body:JSON.stringify({
   tipo:"reserva",
   origen:document.querySelector('#origenBox input').value,
   destino:document.querySelector('#destinoBox input').value,
   km:km,
   tiempo:min,
   precio:precio
 })});
}
</script>

</body>
</html>
