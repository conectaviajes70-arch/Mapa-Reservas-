<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conecta (viajaYa)</title>

<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v4.7.2/mapbox-gl-geocoder.min.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

/* Pantallas */
.screen { display:none; padding:20px;}
.active { display:block; }

button {
  width:100%;
  padding:15px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  background:#00e5ff;
  color:#000;
  font-weight:bold;
}

input {
  width:100%;
  padding:12px;
  margin:8px 0;
  border-radius:10px;
  border:none;
  background:#1a1f2e;
  color:#fff;
}

#map {
  height:200px;
  border-radius:12px;
  margin-top:10px;
}

.logo {
  width:120px;
  display:block;
  margin:0 auto;
}

.result {
  background:#121726;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
}

.price { color:#00e5ff; font-size:20px; }
</style>
</head>

<body>

<!-- PANTALLA 1 -->
<div id="home" class="screen active">
<img src="logo.png" class="logo">
<h2>Bienvenido a Conecta</h2>

<button onclick="goLogin()">Ya tengo cuenta</button>
<button onclick="goRegister()">Crear cuenta</button>
</div>

<!-- LOGIN -->
<div id="login" class="screen">
<h3>Ingresar</h3>
<input id="clave" placeholder="Ingresa tu clave">
<button onclick="login()">Entrar</button>
<button onclick="back()">Regresar</button>
</div>

<!-- REGISTRO -->
<div id="register" class="screen">
<h3>Registro</h3>
<input id="nombre" placeholder="Nombre">
<input id="telefono" placeholder="+52 55...">

<button onclick="enviarOTP()">Enviar OTP</button>

<input id="otp" placeholder="Código OTP">
<button onclick="validarOTP()">Validar</button>
</div>

<!-- RESERVA -->
<div id="reserva" class="screen">
<h3>Reservar viaje</h3>

<div id="origenBox"></div>
<button onclick="usarUbicacion()">📍 Usar mi ubicación</button>

<div id="destinoBox"></div>
<div id="paradaBox"></div>

<select id="fechaTipo">
  <option value="ahora">Lo más pronto (1-2 hrs)</option>
  <option value="hoy">Hoy</option>
  <option value="mañana">Mañana</option>
  <option value="otro">Otra fecha</option>
</select>

<input type="datetime-local" id="fechaHora">

<div id="map"></div>

<button onclick="cotizar()">Cotizar viaje</button>

<div class="result">
<div>📏 Distancia: <span id="km">0</span> km</div>
<div>⏱ Tiempo: <span id="time">0</span> min</div>
<div class="price">💰 $<span id="price">0</span></div>
</div>

<button onclick="aceptar()">Aceptar</button>
<button onclick="rechazar()">Rechazar</button>
</div>
<!-- CONFIRMACION -->
<div id="confirm" class="screen">
<h2>🚗 Has reservado con Conecta</h2>
<p>En breve nos comunicaremos contigo</p>
<button onclick="reset()">Nuevo viaje</button>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiMzkxODM2IiwiYSI6ImNtbXl4dWZoNzAyamwycm9pZHBoYjNpNzEifQ.ryQd-8yPv1gX6BkNsToW_A';

let map = new mapboxgl.Map({
  container:'map',
  style:'mapbox://styles/mapbox/navigation-night-v1',
  center:[-99.1332,19.4326],
  zoom:12
});

let origenCoord, destinoCoord, paradaCoord;
let markers = [];

/* AUTOCOMPLETADO */
function createGeocoder(id, placeholder, callback){
  const geocoder = new MapboxGeocoder({
    accessToken: mapboxgl.accessToken,
    placeholder: placeholder,
    mapboxgl: mapboxgl,
    marker:false,
    countries:'mx'
  });

  document.getElementById(id).appendChild(geocoder.onAdd(map));

  geocoder.on('result', e=>{
    callback(e.result);
  });
}

createGeocoder("origenBox","Origen", (res)=>{
  origenCoord = res.center;
  setMarker(origenCoord,0);
});

createGeocoder("destinoBox","Destino", (res)=>{
  destinoCoord = res.center;
  setMarker(destinoCoord,1);
});

createGeocoder("paradaBox","Parada (opcional)", (res)=>{
  paradaCoord = res.center;
  setMarker(paradaCoord,2);
});

/* MARCADORES (solo 3) */
function setMarker(coord,index){
  if(markers[index]){
    markers[index].setLngLat(coord);
  } else {
    markers[index] = new mapboxgl.Marker().setLngLat(coord).addTo(map);
  }
  map.flyTo({center:coord});
}

/* UBICACIÓN PRECISA */
async function usarUbicacion(){
  navigator.geolocation.getCurrentPosition(async pos=>{
    origenCoord = [pos.coords.longitude, pos.coords.latitude];

    setMarker(origenCoord,0);

    /* Obtener dirección real */
    let res = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${origenCoord[0]},${origenCoord[1]}.json?access_token=${mapboxgl.accessToken}`);
    let data = await res.json();

    let direccion = data.features[0].place_name;

    document.querySelector('#origenBox input').value = direccion;

  }, err=>{
    alert("Activa tu GPS");
  }, {enableHighAccuracy:true});
}

/* DISTANCIA REAL */
function getDistance(c1, c2){
  let R = 6371;
  let dLat = (c2[1]-c1[1])*Math.PI/180;
  let dLon = (c2[0]-c1[0])*Math.PI/180;
  let a = Math.sin(dLat/2)**2 +
    Math.cos(c1[1]*Math.PI/180)*Math.cos(c2[1]*Math.PI/180) *
    Math.sin(dLon/2)**2;
  return R * (2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
}

/* TIEMPO + TARIFA */
async function cotizar(){
  if(!origenCoord || !destinoCoord){
    alert("Completa origen y destino");
    return;
  }

  let coords = `${origenCoord.join(',')};${destinoCoord.join(',')}`;
  if(paradaCoord){
    coords = `${origenCoord.join(',')};${paradaCoord.join(',')};${destinoCoord.join(',')}`;
  }

  let url = `https://api.mapbox.com/directions/v5/mapbox/driving/${coords}?access_token=${mapboxgl.accessToken}`;
  let res = await fetch(url);
  let data = await res.json();

  let route = data.routes[0];

  let km = route.distance / 1000;
  let min = route.duration / 60;

  let precio = 20 + (km * 7) + (min * 1.5);

  document.getElementById('km').innerText = km.toFixed(2);
  document.getElementById('time').innerText = min.toFixed(0);
  document.getElementById('price').innerText = Math.round(precio);
}

/* Navegación */
function goLogin(){show('login')}
function goRegister(){show('register')}
function back(){show('home')}
function show(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

/* LOGIN */
function login(){
 let clave = document.getElementById('clave').value;

 if(clave === "1234"){ // cambiar por backend
   show('reserva');
 } else {
   alert("Clave incorrecta");
   show('register');
 }
}

/* REGISTRO */
function enviarOTP(){
 let tel = document.getElementById('telefono').value;

 if(!tel.startsWith("+52")){
   alert("Número inválido México");
   return;
 }

 if(intentosOTP >= 3){
   alert("Límite de intentos");
   return;
 }

 otpGenerado = Math.floor(1000 + Math.random()*9000);
 otpTime = Date.now();

 alert("OTP: " + otpGenerado); // simulación
}

function validarOTP(){
 let otp = document.getElementById('otp').value;

 if(Date.now() - otpTime > 300000){
   alert("OTP expirado");
   return;
 }

 if(otp == otpGenerado){
   guardarUsuario();
   show('reserva');
 } else {
   intentosOTP++;
   alert("OTP incorrecto");
 }
}

/* MAPA */
async function geocode(place){
 let res = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${place}.json?access_token=${mapboxgl.accessToken}`);
 let data = await res.json();
 return data.features[0].center;
}

function addMarker(coord){
 new mapboxgl.Marker().setLngLat(coord).addTo(map);
}

async function usarUbicacion(){
 navigator.geolocation.getCurrentPosition(pos=>{
   origenCoord = [pos.coords.longitude, pos.coords.latitude];
   addMarker(origenCoord);
 });
}

/* COTIZACION */
async function cotizar(){
 origenCoord = await geocode(document.getElementById('origen').value);
 destinoCoord = await geocode(document.getElementById('destino').value);

 addMarker(origenCoord);
 addMarker(destinoCoord);

 let distancia = getDistance(origenCoord, destinoCoord);
 let tiempo = distancia / 0.5;

 let precio = 20 + (distancia * 7) + (tiempo * 1.5);

 document.getElementById('km').innerText = distancia.toFixed(2);
 document.getElementById('time').innerText = tiempo.toFixed(0);
 document.getElementById('price').innerText = Math.round(precio);

 enviarReserva(distancia, tiempo, precio);
}

/* DISTANCIA */
function getDistance(c1, c2){
 let R = 6371;
 let dLat = (c2[1]-c1[1])*Math.PI/180;
 let dLon = (c2[0]-c1[0])*Math.PI/180;
 let a = Math.sin(dLat/2)*Math.sin(dLat/2) +
 Math.cos(c1[1]*Math.PI/180)*Math.cos(c2[1]*Math.PI/180) *
 Math.sin(dLon/2)*Math.sin(dLon/2);
 let c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
 return R*c;
}

/* BOTONES */
function aceptar(){
 show('confirm');
}

function rechazar(){
 document.querySelectorAll('input').forEach(i=>i.value="");
 document.getElementById('km').innerText=0;
 document.getElementById('price').innerText=0;
}

/* RESET */
function reset(){
 location.reload();
}

/* BACKEND GOOGLE SHEETS */
function guardarUsuario(){
 fetch("TU_URL_APPS_SCRIPT", {
   method:"POST",
   body:JSON.stringify({
     tipo:"registro",
     nombre:document.getElementById('nombre').value,
     telefono:document.getElementById('telefono').value
   })
 });
}

function enviarReserva(distancia, tiempo, precio){
 fetch("TU_URL_APPS_SCRIPT", {
   method:"POST",
   body:JSON.stringify({
     tipo:"reserva",
     origen:document.getElementById('origen').value,
     destino:document.getElementById('destino').value,
     distancia:distancia,
     tiempo:tiempo,
     precio:precio
   })
 });
}
</script>

</body>
</html>
